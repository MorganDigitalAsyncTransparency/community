# CI Workflow for discourse-observer
#
# This is a starter workflow. It is intentionally minimal and not tied
# to a specific language or runtime yet. Update this workflow when the
# first implementation code is added and the language/runtime is decided.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # TODO: Add language-specific setup step when runtime is decided
      # Examples:
      #   - uses: actions/setup-node@v4
      #   - uses: actions/setup-python@v5
      #   - uses: actions/setup-go@v5

      - name: Check project structure
        run: |
          echo "Validating project structure..."
          test -f README.md
          test -f ARCHITECTURE.md
          test -f CONTRIBUTING.md
          test -d src/discourse
          test -d src/observer
          test -d src/model
          test -d src/config
          test -d src/storage
          test -d tests
          test -d docs/decisions
          echo "Project structure is valid."

      # TODO: Add linting step when language and linter are decided
      # TODO: Add test runner step when first tests are written
      # TODO: Add build step if the project requires compilation

      - name: Summary
        run: echo "CI passed. Add language-specific steps as the project evolves."
