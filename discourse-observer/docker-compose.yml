# discourse-observer — deployment topology
#
# Three containers on one internal Docker network:
#
#   Browser ──:3000──▸ nginx (frontend)
#                       ├── /*    → serves React static build
#                       └── /api/ → proxies to backend:8080
#                                        │
#                                   Go API (backend)
#                                        │
#                    ┌───────────────────┴───────────────────┐
#                    │                                       │
#              mockserver:9920                     Discourse API (external)
#             (dev — built-in)                    (prod — via HTTPS + API token)
#
# Only the frontend is exposed to the host.
# The backend is internal-only — reachable by nginx but not from outside Docker.
# The mockserver serves built-in fixtures for dev mode.
# The frontend binds 0.0.0.0:3000 so the dashboard is reachable from
# localhost and from other machines on the local network.

services:
  mockserver:
    build:
      context: .
      dockerfile: docker/mockserver.Dockerfile
    environment:
      MOCK_PAGE_SIZE: 5
    expose:
      - "9920"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9920/categories.json"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 2s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file: .env
    volumes:
      - ./data:/app/data
    expose:
      - "8080"
    depends_on:
      mockserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/status"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
