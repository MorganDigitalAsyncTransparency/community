site_name: discourse-observer
site_description: A generic foundation for observing and analyzing activity from a single Discourse forum.

docs_dir: .

exclude_docs: |
  node_modules/
  site/
  AI_GUIDELINES.md
  CLAUDE.md
  backend/README.md
  backend/config/README.md
  backend/discourse/README.md
  backend/model/README.md
  backend/observer/README.md
  backend/storage/README.md
  backend/api/README.md
  backend/domain/README.md
  backend/mock/README.md
  docs/decisions/template.md
  docs/test-reports/
  tests/README.md

theme:
  name: material

nav:
  - Overview: README.md
  - Getting Started: docs/getting-started.md
  - Architecture: ARCHITECTURE.md
  - Contributing: CONTRIBUTING.md
  - Strategy:
      - Purpose: docs/purpose.md
      - Engineering Strategy: docs/engineering-strategy.md
      - Design Strategy: docs/design-strategy.md
      - Documentation Strategy: docs/documentation-strategy.md
      - API Strategy: docs/api-strategy.md
      - Sync Strategy: docs/sync-strategy.md
  - Specifications:
      - Use Cases: specs/use-cases.md
      - Single Forum Scope: specs/single-forum-scope.md
      - Single Forum Scope Verification: specs/single-forum-scope_verification.md
      - Operational Constraints: specs/operational-constraints.md
      - Operational Constraints Verification: specs/operational-constraints_verification.md
      - Dashboard:
          - Queue Visibility: specs/dashboard/queue-visibility.md
          - Response Metrics: specs/dashboard/response-metrics.md
          - Time Period Filter: specs/dashboard/time-period-filter.md
          - Response Time Trends: specs/dashboard/response-time-trends.md
          - Tag Distribution: specs/dashboard/tag-distribution.md
          - SLO Monitoring: specs/dashboard/slo-monitoring.md
          - Tag and Area Filter: specs/dashboard/tag-area-filter.md
          - Topic Intake: specs/dashboard/topic-intake.md
          - Stalled Topics: specs/dashboard/stalled-topics.md
          - Peak Activity: specs/dashboard/peak-activity.md
          - Response Time Distribution: specs/dashboard/response-time-distribution.md
          - URL State: specs/dashboard/url-state.md
          - Components: specs/dashboard/dashboard-components.md
          - Traceability: specs/dashboard/traceability.md
      - API:
          - API Contract: specs/api/api-contract.md
          - API Contract Verification: specs/api/api-contract_verification.md
          - Traceability: specs/api/traceability.md
      - Observer:
          - Observer Behavior: specs/observer/observer-behavior.md
          - Sync Metadata: specs/observer/sync-metadata.md
      - Discourse:
          - Source Model: specs/discourse/discourse-source-model.md
  - Decisions:
      - Overview: docs/decisions/README.md
      - "0001: Project Foundation": docs/decisions/0001-project-foundation.md
      - "0002: Technology Choices": docs/decisions/0002-technology-choices.md
      - "0003: Programming Languages": docs/decisions/0003-programming-languages.md
      - "0004: Code Quality Tooling": docs/decisions/0004-code-quality-tooling.md
      - "0005: Storage Format": docs/decisions/0005-storage-format.md
      - "0006: Analytical Storage": docs/decisions/0006-analytical-storage.md
      - "0007: Branching and Release Strategy": docs/decisions/0007-branching-and-release-strategy.md
      - "0008: Documentation and Traceability Strategy": docs/decisions/0008-documentation-and-traceability-strategy.md
      - "0009: Chart Library": docs/decisions/0009-chart-library.md
      - "0010: Timezone Strategy": docs/decisions/0010-timezone-strategy.md
      - "0011: Dashboard Layout and Theme": docs/decisions/0011-dashboard-layout-and-theme.md
      - "0012: API Responsibility Model": docs/decisions/0012-api-responsibility-model.md
      - "0013: Sync Strategy": docs/decisions/0013-sync-strategy.md

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - fenced_code
